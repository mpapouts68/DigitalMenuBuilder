<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'bounce-subtle': 'bounceSubtle 0.4s ease-in-out',
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes bounceSubtle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .menu-item:hover {
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }
        .banner-space {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border: 2px dashed #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-50 font-inter">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Bella Vista Café</h1>
                    <p class="text-sm text-slate-500">Authentic Italian Cuisine</p>
                </div>
                <div class="flex items-center space-x-2">
                    <!-- Admin Toggle -->
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="adminMode" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-600"></div>
                    </label>
                    <span class="text-xs text-slate-600">Admin</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Banner Space 1 - Top -->
    <div class="banner-space max-w-md mx-auto my-4 h-20 rounded-lg flex items-center justify-center" data-mock="true">
        <div class="text-center">
            <i class="fas fa-ad text-slate-400 text-2xl mb-1"></i>
            <p class="text-xs text-slate-500">Advertisement Space</p>
        </div>
    </div>

    <!-- Search and Filter -->
    <div class="max-w-md mx-auto px-4 mb-4">
        <div class="relative">
            <input type="text" id="searchInput" placeholder="Search menu items..." 
                   class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
        </div>
        
        <!-- Category Pills -->
        <div class="flex space-x-2 mt-3 overflow-x-auto pb-2" id="categoryPills">
            <button class="category-pill bg-blue-500 text-white px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="all">
                All Items
            </button>
        </div>
    </div>

    <!-- Admin Controls -->
    <div id="adminControls" class="hidden max-w-md mx-auto px-4 mb-4">
        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
            <h3 class="font-semibold text-amber-800 mb-3">Admin Controls</h3>
            <div class="space-y-2">
                <button id="addCategoryBtn" class="w-full bg-amber-600 text-white py-2 rounded-lg hover:bg-amber-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i>Add Category
                </button>
                <button id="importDataBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-upload mr-2"></i>Import CSV Data
                </button>
                <button id="exportDataBtn" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors">
                    <i class="fas fa-download mr-2"></i>Export Data
                </button>
            </div>
        </div>
    </div>

    <!-- Menu Content -->
    <main class="max-w-md mx-auto px-4 pb-8" id="menuContainer">
        <!-- Menu sections will be dynamically generated here -->
    </main>

    <!-- Banner Space 2 - Middle -->
    <div class="banner-space max-w-md mx-auto my-6 h-16 rounded-lg flex items-center justify-center" data-mock="true">
        <div class="text-center">
            <i class="fas fa-bullhorn text-slate-400 text-xl mb-1"></i>
            <p class="text-xs text-slate-500">Promotional Banner</p>
        </div>
    </div>

    <!-- Floating Add Button (Admin Mode) -->
    <button id="addItemBtn" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg hover:bg-blue-700 transition-all hover:scale-110">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modals -->
    <!-- Add/Edit Item Modal -->
    <div id="itemModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6">
            <h3 id="modalTitle" class="text-lg font-semibold mb-4">Add Menu Item</h3>
            <form id="itemForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Item Name</label>
                        <input type="text" id="itemName" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                        <input type="number" id="itemPrice" step="0.01" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                        <textarea id="itemDescription" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                        <select id="itemCategory" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                </div>
                <div class="flex space-x-3 mt-6">
                    <button type="button" id="cancelBtn" class="flex-1 bg-slate-300 text-slate-700 py-2 rounded-lg hover:bg-slate-400 transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="categoryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6">
            <h3 class="text-lg font-semibold mb-4">Add Category</h3>
            <form id="categoryForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Category Name</label>
                        <input type="text" id="categoryName" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Order</label>
                        <input type="number" id="categoryOrder" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                    </div>
                </div>
                <div class="flex space-x-3 mt-6">
                    <button type="button" id="cancelCategoryBtn" class="flex-1 bg-slate-300 text-slate-700 py-2 rounded-lg hover:bg-slate-400 transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CSV Import Modal -->
    <div id="importModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-semibold mb-4">Import CSV Data</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Categories CSV</label>
                    <textarea id="categoriesCSV" rows="6" placeholder="group_id,group_name,group_order&#10;1,Appetizers,1&#10;2,Main Courses,2&#10;3,Desserts,3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Products CSV</label>
                    <textarea id="productsCSV" rows="8" placeholder="product_id,product_name,price,description,group_id&#10;1,Bruschetta,8.99,Toasted bread with tomatoes,1&#10;2,Pasta Carbonara,16.99,Creamy pasta with bacon,2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono"></textarea>
                </div>
            </div>
            <div class="flex space-x-3 mt-6">
                <button type="button" id="cancelImportBtn" class="flex-1 bg-slate-300 text-slate-700 py-2 rounded-lg hover:bg-slate-400 transition-colors">Cancel</button>
                <button type="button" id="importBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">Import</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Sample data
            let categories = [
                { group_id: 1, group_name: "Appetizers", group_order: 1 },
                { group_id: 2, group_name: "Main Courses", group_order: 2 },
                { group_id: 3, group_name: "Pasta", group_order: 3 },
                { group_id: 4, group_name: "Desserts", group_order: 4 },
                { group_id: 5, group_name: "Beverages", group_order: 5 }
            ];

            let products = [
                { product_id: 1, product_name: "Bruschetta Classica", price: 8.99, description: "Toasted bread topped with fresh tomatoes, basil, and garlic", group_id: 1 },
                { product_id: 2, product_name: "Antipasto Platter", price: 14.99, description: "Selection of cured meats, cheeses, olives, and vegetables", group_id: 1 },
                { product_id: 3, product_name: "Arancini", price: 9.99, description: "Crispy risotto balls filled with mozzarella and peas", group_id: 1 },
                { product_id: 4, product_name: "Osso Buco", price: 28.99, description: "Braised veal shanks with vegetables in white wine sauce", group_id: 2 },
                { product_id: 5, product_name: "Chicken Parmigiana", price: 22.99, description: "Breaded chicken breast with marinara sauce and mozzarella", group_id: 2 },
                { product_id: 6, product_name: "Grilled Branzino", price: 26.99, description: "Whole Mediterranean sea bass with herbs and lemon", group_id: 2 },
                { product_id: 7, product_name: "Spaghetti Carbonara", price: 16.99, description: "Classic Roman pasta with eggs, pecorino, and pancetta", group_id: 3 },
                { product_id: 8, product_name: "Fettuccine Alfredo", price: 15.99, description: "Rich and creamy pasta with parmesan cheese", group_id: 3 },
                { product_id: 9, product_name: "Linguine alle Vongole", price: 19.99, description: "Pasta with fresh clams in white wine sauce", group_id: 3 },
                { product_id: 10, product_name: "Tiramisu", price: 7.99, description: "Classic Italian dessert with coffee and mascarpone", group_id: 4 },
                { product_id: 11, product_name: "Gelato Trio", price: 6.99, description: "Three scoops of house-made gelato", group_id: 4 },
                { product_id: 12, product_name: "Espresso", price: 2.99, description: "Strong Italian coffee", group_id: 5 },
                { product_id: 13, product_name: "Chianti Classico", price: 8.99, description: "Glass of Tuscan red wine", group_id: 5 }
            ];

            let isAdminMode = false;
            let editingItem = null;

            // Load data from localStorage if available
            function loadData() {
                const savedCategories = localStorage.getItem('menuCategories');
                const savedProducts = localStorage.getItem('menuProducts');
                
                if (savedCategories) categories = JSON.parse(savedCategories);
                if (savedProducts) products = JSON.parse(savedProducts);
            }

            // Save data to localStorage
            function saveData() {
                localStorage.setItem('menuCategories', JSON.stringify(categories));
                localStorage.setItem('menuProducts', JSON.stringify(products));
            }

            // Render menu
            function renderMenu() {
                const container = document.getElementById('menuContainer');
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const activeCategory = document.querySelector('.category-pill.bg-blue-500')?.dataset.category || 'all';
                
                container.innerHTML = '';

                // Sort categories by order
                const sortedCategories = [...categories].sort((a, b) => a.group_order - b.group_order);

                sortedCategories.forEach(category => {
                    const categoryProducts = products.filter(p => p.group_id === category.group_id);
                    
                    if (categoryProducts.length === 0 && !isAdminMode) return;

                    // Filter products based on search and category
                    const filteredProducts = categoryProducts.filter(product => {
                        const matchesSearch = product.product_name.toLowerCase().includes(searchTerm) ||
                                            product.description.toLowerCase().includes(searchTerm);
                        const matchesCategory = activeCategory === 'all' || activeCategory === category.group_id.toString();
                        return matchesSearch && matchesCategory;
                    });

                    if (filteredProducts.length === 0 && !isAdminMode) return;

                    const section = document.createElement('section');
                    section.className = 'mb-8 animate-fade-in';
                    section.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-semibold text-slate-800">${category.group_name}</h2>
                            ${isAdminMode ? `
                                <div class="flex space-x-2">
                                    <button class="text-blue-600 hover:text-blue-800" onclick="editCategory(${category.group_id})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="text-red-600 hover:text-red-800" onclick="deleteCategory(${category.group_id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="space-y-3">
                            ${filteredProducts.map(product => `
                                <div class="menu-item bg-white rounded-lg p-4 shadow-sm border border-slate-200 relative">
                                    ${isAdminMode ? `
                                        <div class="absolute top-2 right-2 flex space-x-1">
                                            <button class="text-blue-600 hover:text-blue-800 text-sm" onclick="editItem(${product.product_id})">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <button class="text-red-600 hover:text-red-800 text-sm" onclick="deleteItem(${product.product_id})">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    ` : ''}
                                    <div class="flex justify-between items-start ${isAdminMode ? 'pr-12' : ''}">
                                        <div class="flex-1">
                                            <h3 class="font-medium text-slate-800">${product.product_name}</h3>
                                            <p class="text-sm text-slate-600 mt-1">${product.description}</p>
                                        </div>
                                        <span class="text-lg font-semibold text-blue-600 ml-4">$${product.price.toFixed(2)}</span>
                                    </div>
                                </div>
                            `).join('')}
                            ${isAdminMode && filteredProducts.length === 0 ? `
                                <div class="text-center py-8 text-slate-500">
                                    <i class="fas fa-utensils text-2xl mb-2"></i>
                                    <p>No items in this category</p>
                                    <button class="mt-2 text-blue-600 hover:text-blue-800" onclick="openItemModal(${category.group_id})">
                                        Add first item
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    container.appendChild(section);
                });

                if (container.children.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-slate-500">
                            <i class="fas fa-search text-3xl mb-4"></i>
                            <p class="text-lg">No items found</p>
                            <p class="text-sm">Try adjusting your search or filter</p>
                        </div>
                    `;
                }
            }

            // Render category pills
            function renderCategoryPills() {
                const container = document.getElementById('categoryPills');
                const currentActive = document.querySelector('.category-pill.bg-blue-500')?.dataset.category || 'all';
                
                container.innerHTML = `
                    <button class="category-pill ${currentActive === 'all' ? 'bg-blue-500 text-white' : 'bg-white text-slate-600 border border-slate-300'} px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="all">
                        All Items
                    </button>
                `;

                categories.sort((a, b) => a.group_order - b.group_order).forEach(category => {
                    const isActive = currentActive === category.group_id.toString();
                    const button = document.createElement('button');
                    button.className = `category-pill ${isActive ? 'bg-blue-500 text-white' : 'bg-white text-slate-600 border border-slate-300'} px-4 py-2 rounded-full text-sm whitespace-nowrap`;
                    button.dataset.category = category.group_id;
                    button.textContent = category.group_name;
                    container.appendChild(button);
                });
            }

            // Update category select options
            function updateCategorySelect() {
                const select = document.getElementById('itemCategory');
                select.innerHTML = '';
                categories.sort((a, b) => a.group_order - b.group_order).forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.group_id;
                    option.textContent = category.group_name;
                    select.appendChild(option);
                });
            }

            // Event Listeners
            document.getElementById('adminMode').addEventListener('change', function() {
                isAdminMode = this.checked;
                document.getElementById('adminControls').classList.toggle('hidden', !isAdminMode);
                document.getElementById('addItemBtn').classList.toggle('hidden', !isAdminMode);
                renderMenu();
            });

            document.getElementById('searchInput').addEventListener('input', renderMenu);

            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('category-pill')) {
                    document.querySelectorAll('.category-pill').forEach(pill => {
                        pill.className = pill.className.replace('bg-blue-500 text-white', 'bg-white text-slate-600 border border-slate-300');
                    });
                    e.target.className = e.target.className.replace('bg-white text-slate-600 border border-slate-300', 'bg-blue-500 text-white');
                    renderMenu();
                }
            });

            // Modal functions
            window.openItemModal = function(categoryId = null) {
                document.getElementById('itemModal').classList.remove('hidden');
                document.getElementById('modalTitle').textContent = editingItem ? 'Edit Menu Item' : 'Add Menu Item';
                updateCategorySelect();
                
                if (editingItem) {
                    const item = products.find(p => p.product_id === editingItem);
                    document.getElementById('itemName').value = item.product_name;
                    document.getElementById('itemPrice').value = item.price;
                    document.getElementById('itemDescription').value = item.description;
                    document.getElementById('itemCategory').value = item.group_id;
                } else {
                    document.getElementById('itemForm').reset();
                    if (categoryId) {
                        document.getElementById('itemCategory').value = categoryId;
                    }
                }
            };

            window.editItem = function(productId) {
                editingItem = productId;
                openItemModal();
            };

            window.deleteItem = function(productId) {
                if (confirm('Are you sure you want to delete this item?')) {
                    products = products.filter(p => p.product_id !== productId);
                    saveData();
                    renderMenu();
                }
            };

            window.editCategory = function(categoryId) {
                // TODO: Implement category editing
                alert('Category editing feature coming soon!');
            };

            window.deleteCategory = function(categoryId) {
                if (confirm('Are you sure you want to delete this category and all its items?')) {
                    categories = categories.filter(c => c.group_id !== categoryId);
                    products = products.filter(p => p.group_id !== categoryId);
                    saveData();
                    renderCategoryPills();
                    renderMenu();
                }
            };

            // Form submissions
            document.getElementById('itemForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('itemName').value;
                const price = parseFloat(document.getElementById('itemPrice').value);
                const description = document.getElementById('itemDescription').value;
                const categoryId = parseInt(document.getElementById('itemCategory').value);

                if (editingItem) {
                    const item = products.find(p => p.product_id === editingItem);
                    item.product_name = name;
                    item.price = price;
                    item.description = description;
                    item.group_id = categoryId;
                } else {
                    const newId = Math.max(...products.map(p => p.product_id), 0) + 1;
                    products.push({
                        product_id: newId,
                        product_name: name,
                        price: price,
                        description: description,
                        group_id: categoryId
                    });
                }

                saveData();
                renderMenu();
                document.getElementById('itemModal').classList.add('hidden');
                editingItem = null;
            });

            document.getElementById('categoryForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('categoryName').value;
                const order = parseInt(document.getElementById('categoryOrder').value);
                const newId = Math.max(...categories.map(c => c.group_id), 0) + 1;

                categories.push({
                    group_id: newId,
                    group_name: name,
                    group_order: order
                });

                saveData();
                renderCategoryPills();
                renderMenu();
                document.getElementById('categoryModal').classList.add('hidden');
                document.getElementById('categoryForm').reset();
            });

            // Button event listeners
            document.getElementById('addItemBtn').addEventListener('click', () => openItemModal());
            document.getElementById('addCategoryBtn').addEventListener('click', () => {
                document.getElementById('categoryModal').classList.remove('hidden');
                document.getElementById('categoryOrder').value = categories.length + 1;
            });

            document.getElementById('cancelBtn').addEventListener('click', () => {
                document.getElementById('itemModal').classList.add('hidden');
                editingItem = null;
            });

            document.getElementById('cancelCategoryBtn').addEventListener('click', () => {
                document.getElementById('categoryModal').classList.add('hidden');
            });

            document.getElementById('importDataBtn').addEventListener('click', () => {
                document.getElementById('importModal').classList.remove('hidden');
            });

            document.getElementById('cancelImportBtn').addEventListener('click', () => {
                document.getElementById('importModal').classList.add('hidden');
            });

            document.getElementById('exportDataBtn').addEventListener('click', () => {
                const categoriesCSV = 'group_id,group_name,group_order\n' + 
                    categories.map(c => `${c.group_id},"${c.group_name}",${c.group_order}`).join('\n');
                
                const productsCSV = 'product_id,product_name,price,description,group_id\n' + 
                    products.map(p => `${p.product_id},"${p.product_name}",${p.price},"${p.description}",${p.group_id}`).join('\n');

                const dataStr = `Categories:\n${categoriesCSV}\n\nProducts:\n${productsCSV}`;
                const dataBlob = new Blob([dataStr], {type:'text/csv'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'menu_data.csv';
                link.click();
            });

            document.getElementById('importBtn').addEventListener('click', () => {
                try {
                    const categoriesText = document.getElementById('categoriesCSV').value.trim();
                    const productsText = document.getElementById('productsCSV').value.trim();

                    if (categoriesText) {
                        const lines = categoriesText.split('\n');
                        if (lines.length > 1) { // Skip header
                            categories = lines.slice(1).map(line => {
                                const [id, name, order] = line.split(',').map(s => s.replace(/"/g, '').trim());
                                return {
                                    group_id: parseInt(id),
                                    group_name: name,
                                    group_order: parseInt(order)
                                };
                            });
                        }
                    }

                    if (productsText) {
                        const lines = productsText.split('\n');
                        if (lines.length > 1) { // Skip header
                            products = lines.slice(1).map(line => {
                                const parts = line.split(',');
                                const id = parseInt(parts[0]);
                                const name = parts[1].replace(/"/g, '').trim();
                                const price = parseFloat(parts[2]);
                                const description = parts[3].replace(/"/g, '').trim();
                                const groupId = parseInt(parts[4]);
                                return {
                                    product_id: id,
                                    product_name: name,
                                    price: price,
                                    description: description,
                                    group_id: groupId
                                };
                            });
                        }
                    }

                    saveData();
                    renderCategoryPills();
                    renderMenu();
                    document.getElementById('importModal').classList.add('hidden');
                    alert('Data imported successfully!');
                } catch (error) {
                    alert('Error importing data. Please check the CSV format.');
                }
            });

            // Initialize app
            loadData();
            renderCategoryPills();
            renderMenu();

            // QR Code Generation Function
            window.generateQRCode = function() {
                const currentURL = window.location.href;
                const qrCodeURL = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentURL)}`;
                
                const newWindow = window.open('', '_blank');
                newWindow.document.write(`
                    <html>
                        <head><title>Menu QR Code</title></head>
                        <body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif;">
                            <h2>Scan to view menu</h2>
                            <img src="${qrCodeURL}" alt="QR Code for menu" style="border: 1px solid #ccc; padding: 20px;">
                            <p style="margin-top: 20px; text-align: center; max-width: 300px;">
                                Point your phone's camera at this QR code to open the digital menu
                            </p>
                            <button onclick="window.print()" style="margin-top: 20px; padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                Print QR Code
                            </button>
                        </body>
                    </html>
                `);
            };

            // Add QR code button to header (for demo purposes)
            const header = document.querySelector('header .flex');
            const qrButton = document.createElement('button');
            qrButton.className = 'text-blue-600 hover:text-blue-800 ml-2';
            qrButton.innerHTML = '<i class="fas fa-qrcode"></i>';
            qrButton.title = 'Generate QR Code';
            qrButton.onclick = generateQRCode;
            header.appendChild(qrButton);

        })();
    </script>
</body>
</html>
