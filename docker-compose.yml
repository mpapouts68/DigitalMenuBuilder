# Local or Hostman-style deployment: build and run the app with persistent SQLite.
# Copy .env.example to .env, set JWT_SECRET and credentials, then:
#   docker compose --env-file .env up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: digital-menu-builder:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_PATH: ${DATABASE_PATH:-/data/menu.db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PRINTER_USERNAME: ${PRINTER_USERNAME:-printer}
      PRINTER_PASSWORD: ${PRINTER_PASSWORD:-printer123}
      CARD_PROVIDER: ${CARD_PROVIDER:-simulated}
    volumes:
      - menu_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  menu_data:
